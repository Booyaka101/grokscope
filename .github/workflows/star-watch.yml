name: star-watch

# Pings Telegram when someone stars the repo, or opens an issue/PR.
# Runs on GitHub's infra, so it survives the laptop sleeping.
#
# State (last-seen counts) lives in the Actions cache under ONE exact key,
# deleted-then-resaved every run. The old design (unique key per run +
# restore-keys prefix matching) missed the lookup almost every hour, so every
# run believed it was the first and re-sent the "armed" baseline ping — hourly
# Telegram spam. Exact-key restore has no prefix lookup to flake.
# Quiet rules, in order of importance:
#   - a run with no previous state records the baseline SILENTLY — no message
#   - API values are validated as numbers BEFORE state is touched, so a rate
#     limit or API hiccup can neither poison the baseline nor trigger a ping
#   - messages fire only on a genuine increase

on:
  schedule:
    - cron: '23 * * * *'   # hourly at :23 — off the :00 stampede
  workflow_dispatch:        # so it can be triggered by hand to test

permissions:
  contents: read
  actions: write            # delete-then-save of the state cache

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Restore last seen count
        uses: actions/cache/restore@v4
        with:
          path: state
          key: star-watch-state

      - name: Check stars and notify on change
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p state

          is_num() { case "$1" in ''|*[!0-9]*) return 1;; *) return 0;; esac; }

          api() {
            curl -sS --max-time 20 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" "$1"
          }
          repo_json=$(api "https://api.github.com/repos/${GITHUB_REPOSITORY}")
          stars=$(echo "$repo_json" | jq -r '.stargazers_count')
          forks=$(echo "$repo_json" | jq -r '.forks_count')
          issues=$(echo "$repo_json" | jq -r '.open_issues_count')

          # Abort on anything non-numeric BEFORE touching state or Telegram.
          if ! is_num "$stars" || ! is_num "$issues"; then
            echo "non-numeric API response (stars=$stars issues=$issues) — skipping without saving state"
            exit 1
          fi

          prev=""; prev_i=""
          if [ -f state/stars ]; then
            prev=$(cat state/stars)
            prev_i=$(cat state/issues 2>/dev/null || echo '')
            is_num "$prev" || prev=""
            is_num "$prev_i" || prev_i=""
          fi

          echo "$stars"  > state/stars
          echo "$issues" > state/issues
          echo "stars=$stars prev=${prev:-none} issues=$issues prev_issues=${prev_i:-none}"

          send() {
            curl -sS --max-time 20 -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=$1" \
              -d disable_web_page_preview=true >/dev/null
          }

          # No previous state = baseline run: record silently, never ping.
          # (A lost cache used to re-send the "armed" message every hour.)
          if [ -n "$prev" ] && [ "$stars" -gt "$prev" ]; then
            send "⭐ GrokScope: ${prev} → ${stars} stars (+$((stars - prev)))"$'\n'"https://github.com/${GITHUB_REPOSITORY}/stargazers"
          fi
          if [ -n "$prev_i" ] && [ "$issues" -gt "$prev_i" ]; then
            send "💬 GrokScope: new issue/PR (${prev_i} → ${issues} open)"$'\n'"https://github.com/${GITHUB_REPOSITORY}/issues"
          fi

      # actions/cache entries are immutable, so an exact key must be deleted
      # before it can be re-saved. Runs only if the check step succeeded — a
      # failed run keeps the last good state instead of destroying it.
      - name: Drop previous state
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache delete star-watch-state --repo "$GITHUB_REPOSITORY" || true

      - name: Save state
        uses: actions/cache/save@v4
        with:
          path: state
          key: star-watch-state
