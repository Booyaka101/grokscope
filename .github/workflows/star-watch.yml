name: star-watch

# Pings Telegram when someone stars the repo, or opens an issue/PR.
# Runs on GitHub's infra, so it survives the laptop sleeping.
#
# State (last-seen counts) lives in state.json on the meta/star-watch-state
# branch, read/written via the contents API. Everything else failed in
# practice: the Actions cache never restored for this workflow's runs
# ("GetCacheEntryDownloadURL ... workflow run not found", a cache service
# flake) and expires after 7 days unused anyway; repo Actions variables
# reject GITHUB_TOKEN writes ("Resource not accessible by integration").
# Every state miss looked like a first run, and the old first-run branch
# sent a Telegram ping — hourly. The state file is committed only when the
# counts actually change, so the meta branch stays quiet too.
# Quiet rules, in order of importance:
#   - a run with no previous state records the baseline SILENTLY — no message
#   - API values are validated as numbers BEFORE state is touched, so a rate
#     limit or API hiccup can neither poison the baseline nor trigger a ping
#   - messages fire only on a genuine increase

on:
  schedule:
    - cron: '23 * * * *'   # hourly at :23 — off the :00 stampede
  workflow_dispatch:        # so it can be triggered by hand to test

permissions:
  contents: write           # read/write state.json on meta/star-watch-state

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check stars and notify on change
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          is_num() { case "$1" in ''|*[!0-9]*) return 1;; *) return 0;; esac; }

          api() {
            curl -sS --max-time 20 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" "$1"
          }
          repo_json=$(api "https://api.github.com/repos/${GITHUB_REPOSITORY}")
          stars=$(echo "$repo_json" | jq -r '.stargazers_count')
          issues=$(echo "$repo_json" | jq -r '.open_issues_count')

          # Abort on anything non-numeric BEFORE touching state or Telegram.
          if ! is_num "$stars" || ! is_num "$issues"; then
            echo "non-numeric API response (stars=$stars issues=$issues) — skipping without saving state"
            exit 1
          fi

          # Previous state: "<stars> <issues>" in state.json on the meta branch.
          STATE_BRANCH="meta/star-watch-state"
          prev=""; prev_i=""
          state=$(gh api "repos/${GITHUB_REPOSITORY}/contents/state.json?ref=${STATE_BRANCH}" \
                    -H "Accept: application/vnd.github.raw" 2>/dev/null || echo '')
          if [ -n "$state" ]; then
            prev=$(echo "$state" | cut -d' ' -f1)
            prev_i=$(echo "$state" | cut -d' ' -f2)
            is_num "$prev" || prev=""
            is_num "$prev_i" || prev_i=""
          fi
          echo "stars=$stars prev=${prev:-none} issues=$issues prev_issues=${prev_i:-none}"

          send() {
            curl -sS --max-time 20 -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=$1" \
              -d disable_web_page_preview=true >/dev/null
          }

          # No previous state = baseline run: record silently, never ping.
          # (Re-sent "armed" messages on lost state were the hourly spam.)
          if [ -n "$prev" ] && [ "$stars" -gt "$prev" ]; then
            send "⭐ GrokScope: ${prev} → ${stars} stars (+$((stars - prev)))"$'\n'"https://github.com/${GITHUB_REPOSITORY}/stargazers"
          fi
          if [ -n "$prev_i" ] && [ "$issues" -gt "$prev_i" ]; then
            send "💬 GrokScope: new issue/PR (${prev_i} → ${issues} open)"$'\n'"https://github.com/${GITHUB_REPOSITORY}/issues"
          fi

          # Persist only when something changed (or no state exists yet) so the
          # meta branch doesn't collect an hourly no-op commit.
          if [ "$state" != "$stars $issues" ]; then
            if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${STATE_BRANCH}" >/dev/null 2>&1; then
              main_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq .object.sha)
              gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" \
                -f ref="refs/heads/${STATE_BRANCH}" -f sha="$main_sha" >/dev/null
            fi
            file_sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/state.json?ref=${STATE_BRANCH}" \
                         --jq .sha 2>/dev/null || echo '')
            gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/state.json" \
              -f branch="$STATE_BRANCH" \
              -f message="star-watch: ${stars} stars, ${issues} open" \
              -f content="$(printf '%s %s' "$stars" "$issues" | base64)" \
              ${file_sha:+-f sha="$file_sha"} >/dev/null
            echo "state saved: $stars $issues"
          else
            echo "state unchanged"
          fi
